<!DOCTYPE  html>
<html>
	<head>
		<link rel="stylesheet" href="sf1.css" />
		<meta charset="UTF-8">
	</head>
	<body>
		
		<div class="inputs">
			<div class="row border-bottom">
				<div class="col2 padding-13 border-right">
					<span class="title">Mac Address</span>
					<div>
						<input type="text" name="macAddress1" class="macAddress" onkeyup="updateMacAddress(this.name, this.value)" />
						<input type="text" name="macAddress2" class="macAddress" onkeyup="updateMacAddress(this.name, this.value)" />
						<input type="text" name="macAddress3" class="macAddress" onkeyup="updateMacAddress(this.name, this.value)" />
						<input type="text" name="macAddress4" class="macAddress" onkeyup="updateMacAddress(this.name, this.value)" />
						<input type="text" name="macAddress5" class="macAddress" onkeyup="updateMacAddress(this.name, this.value)" />
						<input type="text" name="macAddress6" class="macAddress" onkeyup="updateMacAddress(this.name, this.value)" />
					</div>
				</div>
				<div class="col2 padding-13">
					<span class="title">Number of Attempts</span>
					<div>
						<input type="text" name="numTraderAttempts" class="numAttempts" />
					</div>
				</div>
			</div>
			
			<div class="row padding-13 border-bottom">
				<span class="title">Cards</span>
				<div>
					<input type="text" name="cardSelect" class="cardSelect" autocomplete="on" />
				</div>
			</div>
			
			<div class="row border-bottom">
				<div class="col2 padding-13 border-right">
					<span class="title">Card Traders</span>
					<div>
						<span class="cardTraderOption"><input type="radio" name="cardTrader" value="BIGWAVE" />BIG WAVE</span>
						<span class="cardTraderOption"><input type="radio" name="cardTrader" value="Nacys" />Nacys</span>
						<span class="cardTraderOption"><input type="radio" name="cardTrader" value="Scrapyard" />Scrapyard</span>
						<span class="cardTraderOption"><input type="radio" name="cardTrader" value="AMAKEN" />AMAKEN</span>
					</div>
				</div>
				<div class="col2 padding-13">
					<span class="title">Look for unique cards?</span>
					<span class="checkUnique"><input type="checkbox" name="checkUnique" /></span>
					
				</div>
			</div>
			
			<div class="padding-13">
				<button onclick="checkRng()" class="btn">Find Seeds</button>
			</div>
		</div>
		
		<div id="results"> 
			<div id="seedSelection" class="row padding-13">
				<span class="title">Seeds: </span>
				<select name="seeds" class="seedDropdown"> </select>
			</div>
			
			<div id="loading" class="container">
				<img src="images/loading.gif" />
			</div>
			
			<div id="resultsTable"> </div>
		</div>
		
		<script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
		<script src="cardNames.js"></script>
		<script src="trader_lists.js"></script>
		<script src="rng.js"></script>
		<script src="main.js"></script>
	</body>
</html>
