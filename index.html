<!DOCTYPE  html>
<html>
	<head>
		<link rel="stylesheet" href="sf1.css" />
	</head>
	<body>
		
		<div class="container">
			<span>Mac Address</span>
			<div>
				<input type="text" name="macAddress1" class="macAddress" />
				<input type="text" name="macAddress2" class="macAddress" />
				<input type="text" name="macAddress3" class="macAddress" />
				<input type="text" name="macAddress4" class="macAddress" />
				<input type="text" name="macAddress5" class="macAddress" />
				<input type="text" name="macAddress6" class="macAddress" />
			</div>
		</div>
			
		<div class="container">
			<span>Number of Attempts</span>
			<div>
				<input type="text" name="numTraderAttempts" class="numAttempts" />
			</div>
		</div>
		
		<div class="container">
			<span>Cards</span>
			<div>
				<input type="text" name="cardSelect" class="cardSelect" autocomplete="on" />
			</div>
		</div>
		
		<div class="container">
			<span>Card Traders</span>
			<div class="container">
				<span class="cardTraderOption"><input type="radio" name="cardTrader" value="BIGWAVE" />BIG WAVE</span>
				<span class="cardTraderOption"><input type="radio" name="cardTrader" value="Nacys" />Nacys</span>
				<span class="cardTraderOption"><input type="radio" name="cardTrader" value="Scrapyard" />Scrapyard</span>
				<span class="cardTraderOption"><input type="radio" name="cardTrader" value="AMAKEN" />AMAKEN</span>
			</div>
		</div>
		
		<div class="container">
			<span>Look for unique cards?</span>
			<span class="checkUnique"><input type="checkbox" name="checkUnique" /></span>
			
		</div>
		
		<div class="container">
			<button onclick="checkRng()" class="btn">Find Seeds</button>
		</div>
		
		<div id="loading" class="container">
			<img src="images/loading.gif" />
		</div>
		
		<div id="results" class="container"> </div>
		
		<script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
		<script src="cardNames.js"></script>
		<script src="trader_lists.js"></script>
		<script src="goodCards.js"></script>
		<script src="rng.js"></script>
		<script src="main.js"></script>
	</body>
</html>
